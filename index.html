<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <!-- Header - Employee Schedule Generator -->
    <h1>Employee Schedule Generator</h1>

    <!-- Action Buttons -->
    <div class="actions-container">
      <h2 class="actions-title">Actions</h2>
      <nav class="actions-nav">
        <button id="add-employee-btn">Add Employee</button>
        <button id="generate-schedule-btn">Generate Schedule</button>
        <button id="test-data-btn">Generate Test Data</button>
      </nav>
    </div>

    <div class="main-container">
      <!-- Employee List Sidebar -->
      <aside id="employee-list-sidebar">
        <h2>Employee List</h2>
        <div id="employee-list"></div>
      </aside>

      <!-- Main Content Area -->
      <main class="content-area">
        <!-- Employee Form -->
        <form id="employee-form">
          <div class="name-inputs">
            <label for="job-title">Job Title:</label>
            <input type="text" id="job-title" name="jobTitle" required />

            <label for="first-name">First Name:</label>
            <input type="text" id="first-name" name="firstName" required />

            <label for="last-name">Last Name:</label>
            <input type="text" id="last-name" name="lastName" required />
          </div>
          <!-- availability checkboxes with time inputs -->
          <div class="schedule-section">
            <h3>Availability</h3>

            <div class="day-row">
              <input type="checkbox" id="monday" name="monday" />
              <label for="monday">Monday</label>
              <input type="time" id="monday-start" name="mondayStart" />
              <input type="time" id="monday-end" name="mondayEnd" />
            </div>

            <div class="day-row">
              <input type="checkbox" id="tuesday" name="tuesday" />
              <label for="tuesday">Tuesday</label>
              <input type="time" id="tuesday-start" name="tuesdayStart" />
              <input type="time" id="tuesday-end" name="tuesdayEnd" />
            </div>

            <div class="day-row">
              <input type="checkbox" id="wednesday" name="wednesday" />
              <label for="wednesday">Wednesday</label>
              <input type="time" id="wednesday-start" name="wednesdayStart" />
              <input type="time" id="wednesday-end" name="wednesdayEnd" />
            </div>

            <div class="day-row">
              <input type="checkbox" id="thursday" name="thursday" />
              <label for="thursday">Thursday</label>
              <input type="time" id="thursday-start" name="thursdayStart" />
              <input type="time" id="thursday-end" name="thursdayEnd" />
            </div>

            <div class="day-row">
              <input type="checkbox" id="friday" name="friday" />
              <label for="friday">Friday</label>
              <input type="time" id="friday-start" name="fridayStart" />
              <input type="time" id="friday-end" name="fridayEnd" />
            </div>

            <div class="day-row">
              <input type="checkbox" id="saturday" name="saturday" />
              <label for="saturday">Saturday</label>
              <input type="time" id="saturday-start" name="saturdayStart" />
              <input type="time" id="saturday-end" name="saturdayEnd" />
            </div>

            <div class="day-row">
              <input type="checkbox" id="sunday" name="sunday" />
              <label for="sunday">Sunday</label>
              <input type="time" id="sunday-start" name="sundayStart" />
              <input type="time" id="sunday-end" name="sundayEnd" />
            </div>

            <div class="form-button-group">
              <button type="submit" id="submit-employee-btn">
                Submit Changes
              </button>
              <button type="button" id="cancel-form-btn">Cancel</button>
            </div>
            <button type="button" id="remove-employee-btn" style="display: none;">Remove Employee</button>
          </div>
        </form>

        <!-- Schedule Display -->
        <div id="schedule-container" style="display: none;">
          <div class="schedule-header">
            <h2>Current Schedule</h2>
            <div class="schedule-controls">
              <label for="weeks-select">Number of Weeks:</label>
              <select id="weeks-select">
                <option value="1">1 Week</option>
                <option value="2">2 Weeks</option>
                <option value="3">3 Weeks</option>
                <option value="4">4 Weeks</option>
              </select>
              <button id="regenerate-schedule-btn">Regenerate</button>
            </div>
          </div>
          <div id="schedule-table-wrapper">
            <!-- Schedule table will be dynamically inserted here -->
          </div>
        </div>
      </main>
    </div>

    <!-- Test Data Generation Form -->
    <div id="test-data-form-overlay" class="form-overlay" style="display: none">
      <div id="test-data-form-container" class="test-form-container">
        <h2>Generate Test Data</h2>
        <h3>
          Use the form below to generate random employee data for testing
          schedule generation.
        </h3>
        <form id="test-data-form">
          <div class="test-form-group">
            <label for="num-employees">Number of Employees:</label>
            <input
              type="number"
              id="num-employees"
              name="numEmployees"
              min="1"
              max="50"
              value="5"
              required
            />
          </div>

          <div class="test-form-group">
            <label for="job-title-test">Job Title:</label>
            <input
              type="text"
              id="job-title-test"
              name="jobTitleTest"
              placeholder="e.g., Housekeeper, Server, Cook"
              required
            />
          </div>

          <div class="test-form-group">
            <label for="shift-start">Shift Start Time:</label>
            <input
              type="time"
              id="shift-start"
              name="shiftStart"
              value="07:00"
              required
            />
          </div>

          <div class="test-form-group">
            <label for="shift-end">Shift End Time:</label>
            <input
              type="time"
              id="shift-end"
              name="shiftEnd"
              value="15:00"
              required
            />
          </div>

          <div class="test-form-buttons">
            <button type="submit" id="generate-test-data-btn">
              Generate Employees
            </button>
            <button type="button" id="cancel-test-form-btn">Cancel</button>
          </div>
        </form>
      </div>
    </div>

    <!-- TODO: dynamically rendered table - generated schedule -->

    <script src="script.js"></script>
  </body>
</html>
